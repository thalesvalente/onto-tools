[pytest]
# Pytest Configuration for OntoTools
# MBT + E2E Testing Strategy

# Diretório raiz dos testes
testpaths = tests

# Padrão de descoberta de arquivos de teste
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opções padrão
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    -v
    --tb=short
    --color=yes
    --import-mode=importlib

# Markers personalizados para categorização
markers =
    unit: Unit tests - testes isolados de funções/classes puras
    integration: Integration tests - testes de fluxos sem TUI
    e2e: End-to-end tests - testes de usuário via TUI (Wexpect)
    smoke: Smoke tests - testes rápidos de sanidade
    regression: Regression tests - testes de bugs corrigidos
    slow: Tests that take significant time to run
    wexpect: Tests using Wexpect for CLI automation
    critical: Critical path tests (P0)
    high: High priority tests (P1)
    medium: Medium priority tests (P2)
    low: Low priority tests (P3)

# Configurações de output
console_output_style = progress
log_cli = false
log_cli_level = INFO

# Timeout padrão (requer pytest-timeout)
# timeout = 300

# Diretórios a ignorar
norecursedirs = 
    .git
    .pytest_cache
    __pycache__
    *.egg-info
    htmlcov
    .coverage
    outputs
    reports
    coverage
    docs

# Avisos
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Cobertura mínima (será validada no Nível 3)
# Executar com: pytest --cov --cov-fail-under=95
